<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>硅谷 LLM 今日内裤</title>
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #faf6f1;
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    color: #1a1a1a;
    padding: 40px 20px 80px;
    overflow-x: hidden;
  }

  /* Header */
  .top-bar {
    max-width: 600px;
    margin: 0 auto 12px;
    display: flex;
    justify-content: flex-end;
  }

  .switcher {
    display: flex;
    gap: 3px;
    background: #fff;
    border: 1px solid rgba(0,0,0,0.08);
    padding: 4px;
    border-radius: 100px;
  }

  .sw-btn {
    padding: 7px 18px;
    font-size: 0.78rem;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    background: transparent;
    color: #b5aa9e;
    transition: all 0.25s ease;
    white-space: nowrap;
  }

  .sw-btn:hover { color: #666; }

  .sw-btn.active-claude { background: #c96442; color: #fff; }
  .sw-btn.active-gemini { background: #4285F4; color: #fff; }
  .sw-btn.active-gpt { background: #10a37f; color: #fff; }

  .header {
    text-align: center;
    margin-bottom: 44px;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .header .sub {
    color: #b5aa9e;
    font-size: 0.9rem;
    transition: all 0.3s;
  }

  /* Main content */
  .main { display: flex; flex-direction: column; align-items: center; }

  .stage {
    position: relative;
    width: 260px;
    height: 200px;
    margin-bottom: 36px;
  }

  .underwear {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transform: scale(0.6) rotate(-10deg);
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.08));
  }
  .underwear.show { opacity: 1; transform: scale(1) rotate(0); }
  .underwear svg { width: 220px; height: 180px; }

  .sparkle {
    position: absolute; font-size: 1.2rem; opacity: 0; pointer-events: none;
  }
  .sparkle.go { animation: sparkPop 0.8s ease forwards; }
  @keyframes sparkPop {
    0% { opacity: 0; transform: scale(0) translateY(0); }
    40% { opacity: 1; transform: scale(1.2); }
    100% { opacity: 0; transform: scale(0.8) translateY(-30px); }
  }

  .color-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem; font-weight: 600; margin-bottom: 6px;
    opacity: 0; transform: translateY(12px); transition: all 0.5s ease 0.3s;
    text-align: center;
  }
  .color-name.show { opacity: 1; transform: translateY(0); }

  .color-hex {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem; color: #b5aa9e; margin-bottom: 10px;
    opacity: 0; transition: opacity 0.4s ease 0.4s;
    text-align: center;
  }
  .color-hex.show { opacity: 1; }

  .fortune {
    font-size: 0.88rem; color: #8c8279; max-width: 420px;
    text-align: center; line-height: 1.7; margin-bottom: 40px;
    opacity: 0; transform: translateY(10px); transition: all 0.5s ease 0.5s;
  }
  .fortune.show { opacity: 1; transform: translateY(0); }

  .draw-btn {
    padding: 14px 52px; font-size: 0.95rem; font-weight: 500;
    font-family: 'DM Sans', sans-serif; border: 1px solid #1a1a1a;
    border-radius: 100px; cursor: pointer; color: #faf6f1;
    background: #1a1a1a; letter-spacing: 1px; transition: all 0.3s ease;
  }
  .draw-btn:hover { background: transparent; color: #1a1a1a; }
  .draw-btn:active { transform: scale(0.96); }

  .secret-counter {
    position: fixed; bottom: 20px; right: 24px;
    font-size: 0.7rem; color: #ddd;
    font-family: 'JetBrains Mono', monospace; user-select: none;
  }

  /* Overlay */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    backdrop-filter: blur(6px); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.4s;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }

  .egg-card {
    background: #fff; border-radius: 20px; padding: 40px 38px;
    max-width: 480px; text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,0.15);
    transform: translateY(20px) scale(0.95);
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .overlay.show .egg-card { transform: translateY(0) scale(1); }
  .egg-card .icon { font-size: 3rem; margin-bottom: 12px; }
  .egg-card h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 14px; }
  .egg-card p { font-size: 0.88rem; color: #8c8279; line-height: 1.75; margin-bottom: 10px; }

  .close-btn {
    margin-top: 16px; padding: 10px 32px; border: 1px solid #1a1a1a;
    border-radius: 100px; background: transparent;
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
    cursor: pointer; transition: all 0.2s;
  }
  .close-btn:hover { background: #1a1a1a; color: #fff; }
  .tiny { font-size: 0.7rem; color: #ccc; margin-top: 12px; font-style: italic; }

  .badge {
    display: inline-block; padding: 3px 12px; border-radius: 100px;
    font-size: 0.7rem; font-weight: 600; letter-spacing: 1px;
    margin-bottom: 10px; text-transform: uppercase;
  }

  /* Empty state */
  .empty {
    text-align: center; padding: 60px 20px; color: #ccc;
  }
  .empty .empty-icon {
    width: 72px; height: 72px; margin: 0 auto 16px; border-radius: 50%;
    background: #f3ede5; border: 1px dashed rgba(0,0,0,0.06);
    display: flex; align-items: center; justify-content: center; font-size: 1.6rem;
  }
  .empty p { font-size: 0.9rem; }
</style>
</head>

// Add badge CSS classes dynamically
const badgeStyles = { 'badge-shop':'background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9', 'badge-mythic':'background:linear-gradient(90deg,#dc2626,#111);color:#fff', 'badge-legend':'background:#1a1a1a;color:#fff', 'badge-error':'background:#fee;color:#d33;border:1px solid #fcc', 'badge-sad':'background:#f0f0f5;color:#888', 'badge-agi':'background:linear-gradient(90deg,#10a37f,#1a7f64);color:#fff', 'badge-edge':'background:#1a1a1a;color:#fff', 'badge-pink':'background:linear-gradient(90deg,#ff6b9d,#c084fc);color:#fff', 'badge-warn':'background:#fff3cd;color:#856404;border:1px solid #ffc107' };

// ============== STATE ==============
let current = 'claude';
let drawCounts = { claude:0, gemini:0, gpt:0 };
let unlockedEggs = { claude:new Set(), gemini:new Set(), gpt:new Set() };

// ============== SWITCH ==============
function switchTo(who) {
  current = who;
  // Update buttons
  document.querySelectorAll('.sw-btn').forEach(b => b.className = 'sw-btn');
  const cls = { claude:'active-claude', gemini:'active-gemini', gpt:'active-gpt' };
  document.getElementById({claude:'swClaude',gemini:'swGemini',gpt:'swGpt'}[who]).classList.add(cls[who]);
  // Update subtitle
  document.getElementById('subText').textContent = DATA[who].sub;
  // Reset display
  document.getElementById('underwear').classList.remove('show');
  document.getElementById('colorName').classList.remove('show');
  document.getElementById('colorHex').classList.remove('show');
  document.getElementById('fortune').classList.remove('show');
  document.getElementById('emptyState').style.display = '';
  document.getElementById('secretCounter').textContent = drawCounts[who] ? `x${drawCounts[who]}` : '';
}

// ============== DRAW ==============
function draw() {
  const d = DATA[current];
  drawCounts[current]++;
  const count = drawCounts[current];
  document.getElementById('secretCounter').textContent = `x${count}`;

  if (d.eggTriggers[count]) {
    const name = d.eggTriggers[count];
    unlockedEggs[current].add(name);
    showEgg(d.eggs[name], d.disclaimer);
    return;
  }

  const unlocked = unlockedEggs[current];
  if (unlocked.size > 0 && Math.random() < 0.04 * unlocked.size) {
    const arr = Array.from(unlocked);
    showEgg(d.eggs[arr[Math.floor(Math.random() * arr.length)]], d.disclaimer);
    return;
  }

  const seed = hashStr(new Date().toISOString().slice(0,10) + '-' + current + '-' + count);
  const pick = d.colors[seed % d.colors.length];
  animateDraw(pick);
}

function applyFill(path, val) {
  if (val.startsWith('pattern:') || val.startsWith('gradient:')) {
    path.setAttribute('fill', `url(#${val.split(':')[1]})`);
  } else {
    path.setAttribute('fill', val);
  }
}

function animateDraw(pick, opts = {}) {
  document.getElementById('emptyState').style.display = 'none';
  const uw = document.getElementById('underwear');
  const path = document.getElementById('uwPath');
  const nameEl = document.getElementById('colorName');
  const hexEl = document.getElementById('colorHex');
  const fortuneEl = document.getElementById('fortune');

  uw.classList.remove('show');
  nameEl.classList.remove('show');
  hexEl.classList.remove('show');
  fortuneEl.classList.remove('show');

  setTimeout(() => {
    applyFill(path, pick.hex);
    hexEl.textContent = pick.displayHex || pick.hex;
    nameEl.textContent = pick.name;
    nameEl.style.color = pick.nameColor || '#1a1a1a';
    fortuneEl.textContent = pick.fortune;
    uw.classList.add('show');
    nameEl.classList.add('show');
    hexEl.classList.add('show');
    fortuneEl.classList.add('show');
    popSparkles(opts.sparkleCount || 6);
  }, 200);
}

function popSparkles(count) {
  const stage = document.getElementById('stage');
  const emojis = ['&#10024;','&#9733;','&#10025;','&#128171;','&#127775;'];
  for (let i = 0; i < count; i++) {
    const sp = document.createElement('span');
    sp.className = 'sparkle';
    sp.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
    sp.style.left = (20 + Math.random() * 200) + 'px';
    sp.style.top = (20 + Math.random() * 140) + 'px';
    sp.style.animationDelay = (Math.random() * 0.3) + 's';
    stage.appendChild(sp);
    requestAnimationFrame(() => sp.classList.add('go'));
    setTimeout(() => sp.remove(), 1200);
  }
}

function showEgg(egg, disclaimer) {
  animateDraw(egg.pick, { sparkleCount: 12 });
  setTimeout(() => {
    const style = badgeStyles[egg.badge] || '';
    document.getElementById('eggCard').innerHTML = `
      <div class="icon">${egg.icon}</div>
      <span class="badge" style="${style}">${egg.badgeText}</span>
      <h2>${egg.title}</h2>
      ${egg.body}
      <button class="close-btn" onclick="closeEgg()">朕知道了</button>
      <p class="tiny">${disclaimer}</p>`;
    document.getElementById('overlay').classList.add('show');
  }, 900);
}

function closeEgg() { document.getElementById('overlay').classList.remove('show'); }

function hashStr(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) { h = ((h << 5) - h) + str.charCodeAt(i); h |= 0; }
  return Math.abs(h);
}
